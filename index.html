<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Comunitaria Streaming 🎧</title>
    <link rel="stylesheet" href="frontend/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="brand">
                <h2>Radio <span>Comunitaria</span></h2>
                <div id="connection-status" class="status-badge disconnected">Desconectado</div>
            </div>

            <div class="playlist-section">
                <h3>Cola de Reproducción</h3>
                <ul id="playlist-queue" class="queue-list">
                    <li class="empty-msg">No hay canciones en la cola</li>
                </ul>
            </div>

            <div class="add-track-form">
                <input type="text" id="youtube-url" placeholder="Pega el enlace de YouTube aquí...">
                <button id="btn-add-track">Añadir a la cola</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="player-wrapper">
                <div id="yt-player"></div>
            </div>

            <div class="room-controls">
                <button id="btn-sync" class="btn-primary">🔄 Forzar Sincronización</button>
                <button id="btn-play-pause" class="btn-secondary">⏸️ Pausa / ▶️ Play</button>
            </div>
        </main>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="frontend/js/app.js"></script>
</body>
</html>
